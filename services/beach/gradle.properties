kotlin.code.style=official

# Cap build-time memory so the Kotlin compile fits on small (≤4 GB) hosts.
# Without this the Gradle/Kotlin JVM grabs as much heap as available and OOMs
# when building alongside the other services on a constrained Coolify server.
org.gradle.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=256m
org.gradle.workers.max=2

