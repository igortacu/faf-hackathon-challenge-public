services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    image: postgres:16-alpine
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        psql -tc "SELECT 1 FROM pg_database WHERE datname='hotel'" | grep -q 1 || psql -c 'CREATE DATABASE hotel;'
        psql -tc "SELECT 1 FROM pg_database WHERE datname='beach'" | grep -q 1 || psql -c 'CREATE DATABASE beach;'
        psql -v ON_ERROR_STOP=1 -d beach <<'SQL'
        CREATE TABLE IF NOT EXISTS activities (
            id VARCHAR(50) PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            description TEXT,
            capacity INT NOT NULL
        );
        CREATE TABLE IF NOT EXISTS activity_bookings (
            activity_id VARCHAR(50) NOT NULL REFERENCES activities(id) ON DELETE CASCADE,
            visitor_id VARCHAR(50) NOT NULL,
            PRIMARY KEY (activity_id, visitor_id)
        );
        INSERT INTO activities (id, name, description, capacity) VALUES
        ('ACT001', 'Beach Volleyball', 'Competitive beach volleyball tournament.', 20),
        ('ACT002', 'Surf Lessons', 'Beginner-friendly surf training session.', 15),
        ('ACT003', 'Snorkeling Adventure', 'Explore underwater marine life.', 12),
        ('ACT004', 'Sunrise Yoga', 'Morning yoga on the beach.', 25),
        ('ACT005', 'Kayaking Tour', 'Guided kayaking along the coastline.', 10),
        ('ACT006', 'Sandcastle Competition', 'Build the ultimate sandcastle.', 30),
        ('ACT007', 'Beach Soccer', 'Friendly soccer matches on the sand.', 22),
        ('ACT008', 'Scuba Diving', 'Discover deeper ocean wonders.', 8),
        ('ACT009', 'Jet Ski Experience', 'High-speed water adventure.', 1),
        ('ACT010', 'Beach Bonfire', 'Evening gathering with music and snacks.', 40),
        ('ACT011', 'Fishing Excursion', 'Learn fishing techniques with experts.', 10),
        ('ACT012', 'Paddle Boarding', 'Relaxing paddle board session.', 14),
        ('ACT013', 'Nature Walk', 'Guided tour of local flora and fauna.', 18),
        ('ACT014', 'Photography Workshop', 'Capture stunning beach landscapes.', 16),
        ('ACT015', 'Treasure Hunt', 'Family-friendly beach treasure hunt.', 25),
        ('ACT016', 'Cooking Class', 'Learn to prepare local seafood dishes.', 12),
        ('ACT017', 'Sailing Basics', 'Introduction to sailing techniques.', 10),
        ('ACT018', 'Beach Cleanup', 'Community environmental activity.', 50),
        ('ACT019', 'Meditation Session', 'Relaxing guided meditation by the sea.', 20),
        ('ACT020', 'Sunset Cruise', 'Boat cruise during sunset hours.', 15)
        ON CONFLICT (id) DO NOTHING;
        SQL

  broadcast:
    build: ./services/broadcast
    env_file: .env
    environment:
      PORT: "3002"
      CORS_ORIGIN: "*"
      ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 5

  airport:
    build: ./services/airport
    env_file: .env
    environment:
      PORT: "3001"
      DATABASE_PATH: /data/airport.db
      BROADCAST_SERVICE_URL: http://broadcast:3002
    volumes:
      - airport_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      broadcast:
        condition: service_started

  hotel:
    build: ./services/hotel
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hotel
      AIRPORT_SERVICE_URL: http://airport:3001
      BROADCAST_SERVICE_URL: http://broadcast:3002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db-init:
        condition: service_completed_successfully
      broadcast:
        condition: service_started

  crab:
    build: ./services/crab
    env_file: .env
    environment:
      PORT: "3004"
      BROADCAST_SERVICE_URL: http://broadcast:3002
      SIMULATION_START_TIME: ${VITE_SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${VITE_GAME_SPEED:-300}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      broadcast:
        condition: service_started

  goat-farm:
    build: ./services/goat-farm
    env_file: .env
    environment:
      PORT: "3005"
      SIMULATION_START_TIME: ${VITE_SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${VITE_GAME_SPEED:-300}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  beach:
    build: ./services/beach
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      JDBC_URL: jdbc:postgresql://postgres:5432/beach
      DB_NAME: beach
      DB_USER: postgres
      DB_PASSWORD: postgres
      APP_PORT: "8080"
      BROADCAST_SERVICE_URL: http://broadcast:3002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      db-init:
        condition: service_completed_successfully
      broadcast:
        condition: service_started

  parrot:
    build: ./services/parrot
    env_file: .env
    environment:
      port: "3003"
      airport_service_url: http://airport:3001
      hotel_service_url: http://hotel:3000
      crab_service_url: http://crab:3004
      broadcast_service_url: http://broadcast:3002
      ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      airport:
        condition: service_started
      hotel:
        condition: service_started
      broadcast:
        condition: service_started

  parrot-b:
    build: ./services/parrot
    env_file: .env
    environment:
      port: "3003"
      airport_service_url: http://airport:3001
      hotel_service_url: http://hotel:3000
      crab_service_url: http://crab:3004
      broadcast_service_url: http://broadcast:3002
      ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      airport:
        condition: service_started
      hotel:
        condition: service_started
      broadcast:
        condition: service_started

  gateway:
    build: ./gateway
    env_file: .env
    environment:
      PORT: "8000"
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8080
      CRAB_SERVICE_URL: http://crab:3004
      GOAT_FARM_SERVICE_URL: http://goat-farm:3005
      BROADCAST_SERVICE_URL: http://broadcast:3002
      PARROT_SERVICE_URL: http://parrot:3003,http://parrot-b:3003
      CORS_ALLOWED_ORIGINS: "*"
      ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      airport:
        condition: service_started
      hotel:
        condition: service_started
      beach:
        condition: service_started
      crab:
        condition: service_started
      goat-farm:
        condition: service_started
      broadcast:
        condition: service_started
      parrot:
        condition: service_started
      parrot-b:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_MOCK: ${VITE_MOCK:-false}
        VITE_ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
        VITE_TRAFFIC_GENERATOR: ${VITE_TRAFFIC_GENERATOR:-off}
        VITE_PARROT_CHAT_COOLDOWN_MS: ${VITE_PARROT_CHAT_COOLDOWN_MS:-30000}
        VITE_SIMULATION_START_TIME: ${VITE_SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
        VITE_GAME_SPEED: ${VITE_GAME_SPEED:-300}
        VITE_FE_TOKEN: ${FE_TOKEN:-}
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
  airport_data:
