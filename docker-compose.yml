services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init/01_create_databases.sql:/docker-entrypoint-initdb.d/01_create_databases.sql
      - ./db/init/02_seed_beach.sql:/docker-entrypoint-initdb.d/02_seed_beach.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  broadcast:
    build: ./services/broadcast
    env_file: .env
    environment:
      PORT: "3002"
      CORS_ORIGIN: "*"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 5

  airport:
    build: ./services/airport
    env_file: .env
    environment:
      PORT: "3001"
      DATABASE_PATH: /data/airport.db
      BROADCAST_SERVICE_URL: http://broadcast:3002
    volumes:
      - airport_data:/data
    ports:
      - "3001:3001"
    depends_on:
      broadcast:
        condition: service_started

  hotel:
    build: ./services/hotel
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hotel
      AIRPORT_SERVICE_URL: http://airport:3001
      BROADCAST_SERVICE_URL: http://broadcast:3002
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      broadcast:
        condition: service_started

  beach:
    build: ./services/beach
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      JDBC_URL: jdbc:postgresql://postgres:5432/beach
      DB_NAME: beach
      DB_USER: postgres
      DB_PASSWORD: postgres
      APP_PORT: "8080"
      BROADCAST_SERVICE_URL: http://broadcast:3002
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      broadcast:
        condition: service_started

  parrot:
    build: ./services/parrot
    env_file: .env
    environment:
      port: "3003"
      airport_service_url: http://airport:3001
      hotel_service_url: http://hotel:3000
    ports:
      - "3003:3003"
    depends_on:
      airport:
        condition: service_started
      hotel:
        condition: service_started

  parrot-b:
    build: ./services/parrot
    env_file: .env
    environment:
      port: "3003"
      airport_service_url: http://airport:3001
      hotel_service_url: http://hotel:3000
    depends_on:
      airport:
        condition: service_started
      hotel:
        condition: service_started

  gateway:
    build: ./gateway
    env_file: .env
    environment:
      PORT: "8000"
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8080
      BROADCAST_SERVICE_URL: http://broadcast:3002
      PARROT_SERVICE_URL: http://parrot:3003,http://parrot-b:3003
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      airport:
        condition: service_started
      hotel:
        condition: service_started
      beach:
        condition: service_started
      broadcast:
        condition: service_started
      parrot:
        condition: service_started
      parrot-b:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_MOCK: ${VITE_MOCK:-false}
        VITE_ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
        VITE_TRAFFIC_GENERATOR: ${VITE_TRAFFIC_GENERATOR:-off}
        VITE_PARROT_CHAT_COOLDOWN_MS: ${VITE_PARROT_CHAT_COOLDOWN_MS:-30000}
        VITE_SIMULATION_START_TIME: ${VITE_SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
        VITE_GAME_SPEED: ${VITE_GAME_SPEED:-300}
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
  airport_data:
